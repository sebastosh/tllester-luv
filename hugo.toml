baseURL = 'https://luv.tllester.info/'
languageCode = 'en-us'
title = "Luv 'til it Hurts"

[taxonomies]
  category = 'categories'

[params]
  description = "Luv 'til it Hurts imagines faster resources for HIV-related activism."
  author = "Todd Lanier Lester"
  footerText = "Luv 'til it Hurts &copy; 2024"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Pagination
[pagination]
  pagerSize = 10

# Permalinks
[permalinks]
  posts = '/:slug/'
  pages = '/:slug/'

