<article id="post-{{ .Params.id }}" class="post type-post{{ with .Params.coverImage }} with-featured-image{{ else }} without-featured-image{{ end }}">
  <div class="post-content">

    {{ if not $.IsHome }}
    <header class="entry-header">
      <h2 class="entry-title">
        <a href="{{ .Permalink }}" rel="bookmark">{{ .Title }}</a>
      </h2>
      {{ partial "post-byline.html" . }}
    </header>
    {{ end }}

    {{ with .Params.coverImage }}
    <div class="featured-image">
      <a href="{{ $.Permalink }}" rel="bookmark">
        <img src="/posts/images/{{ . }}" alt="{{ $.Title }}">
      </a>
    </div>
    {{ end }}

    <div class="entry-content">
      {{ if $.IsHome }}
        <header class="entry-header">
          <h2 class="entry-title">
            <a href="{{ $.Permalink }}" rel="bookmark">{{ $.Title }}</a>
          </h2>
          {{ partial "post-byline.html" $ }}
        </header>
      {{ end }}

      {{ .Summary }}

      {{ if .Truncated }}
        <a href="{{ .Permalink }}" class="more-link">Read More</a>
      {{ end }}
    </div>
  </div>
</article>
