{{ $currentPage := . }}
<ul id="menu-primary" class="menu">
  {{ range .Site.Menus.main }}
    {{ if .HasChildren }}
      <li class="menu-item menu-item-has-children{{ if $currentPage.IsMenuCurrent "main" . }} current-menu-item{{ end }}">
        <a href="{{ .URL }}">{{ .Name }}</a>
        <ul class="sub-menu">
          {{ range .Children }}
            <li class="menu-item{{ if $currentPage.IsMenuCurrent "main" . }} current-menu-item{{ end }}">
              <a href="{{ .URL }}">{{ .Name }}</a>
            </li>
          {{ end }}
        </ul>
      </li>
    {{ else if .Parent }}
      {{/* Skip — rendered as child above */}}
    {{ else }}
      <li class="menu-item{{ if $currentPage.IsMenuCurrent "main" . }} current-menu-item{{ end }}">
        <a href="{{ .URL }}">{{ .Name }}</a>
      </li>
    {{ end }}
  {{ end }}
  <li class="menu-item menu-item-search search-toggle"><i class="fa fa-search"></i><i class="fas fa-times"></i></li>
</ul>
