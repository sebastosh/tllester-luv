<footer id="colophon" class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <div class="footer-tagline">
        <div class="site-info">
          {{ with .Site.Params.footerText }}
            {{ . | safeHTML }}
          {{ else }}
            &copy; {{ now.Year }} {{ $.Site.Title }}
          {{ end }}
        </div>
      </div>
    </div>
  </div>
</footer>
